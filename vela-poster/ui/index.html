    <!-- Chrome API Shim — must load BEFORE the popup bundle -->
    <script src="/chrome-api-shim.js"></script>
    <!-- Global error catcher for debugging -->
    <script>
      window.__errors = [];
      window.addEventListener('error', function(e) {
        window.__errors.push({msg: e.message, file: e.filename, line: e.lineno, col: e.colno});
        console.error('[ERROR]', e.message, e.filename, e.lineno);
      });
      window.addEventListener('unhandledrejection', function(e) {
        window.__errors.push({msg: String(e.reason), type: 'promise'});
        console.error('[PROMISE ERROR]', String(e.reason));
      });
    </script>
