<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/assets/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Facebook Groups Bulk Poster (Vela)</title>
    <!-- Chrome API Shim — must load BEFORE the popup bundle -->
    <script src="/chrome-api-shim.js"></script>
    <!-- Global error catcher for debugging -->
    <script>
      window.__errors = [];
      var _origConsoleError = console.error.bind(console);
      console.error = function() {
        var args = Array.prototype.slice.call(arguments);
        var msg = args.map(function(a) { try { return typeof a === 'object' ? JSON.stringify(a).substring(0,500) : String(a).substring(0,500); } catch(e) { return String(a).substring(0,200); } }).join(' | ');
        window.__errors.push({msg: msg, type: 'console.error'});
        _origConsoleError.apply(console, arguments);
      };
      window.addEventListener('error', function(e) {
        window.__errors.push({msg: e.message, file: e.filename, line: e.lineno, col: e.colno});
      });
      window.addEventListener('unhandledrejection', function(e) {
        window.__errors.push({msg: String(e.reason).substring(0,500), type: 'promise'});
      });
    </script>
    <script type="module" crossorigin src="/assets/main-BRMGV53A.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/main-BPtpQltp.css">
  </head>

  </body>
</html>
