<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Remote Browser</title>
  <style>
    :root{--bg:#0c0c0e;--surface:#16161a;--border:#2a2a32;--text:#e8e6e3;--text-dim:#8b8994;--accent:#e07840;--mono:'Courier New',monospace}
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column}

    .toolbar{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
    .toolbar input{flex:1;padding:5px 10px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:12px;font-family:var(--mono)}
    .toolbar button{padding:5px 12px;background:var(--accent);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600}
    .toolbar button:hover{opacity:.85}
    .toolbar button.secondary{background:var(--border);color:var(--text-dim)}
    .toolbar .status{font-size:10px;color:var(--text-dim);font-family:var(--mono);white-space:nowrap}

    .viewport{flex:1;position:relative;overflow:hidden;cursor:crosshair;display:flex;align-items:center;justify-content:center;background:#111}
    .viewport img{max-width:100%;max-height:100%;object-fit:contain;display:block;user-select:none;-webkit-user-drag:none}
    .viewport .loading{color:var(--text-dim);font-size:14px}

    .input-bar{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
    .input-bar input{flex:1;padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:13px}
    .input-bar button{padding:6px 14px;background:var(--accent);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600}
    .input-bar .hint{font-size:10px;color:var(--text-dim)}
  </style>
</head>
<body>
  <div class="toolbar">
    <button class="secondary" onclick="goBack()">&#8592;</button>
    <button class="secondary" onclick="refresh()">&#8635;</button>
    <input id="urlBar" type="text" placeholder="URL..." onkeydown="if(event.key==='Enter')navigate()">
    <button onclick="navigate()">Go</button>
    <span class="status" id="status">Connecting...</span>
    <button class="secondary" onclick="closeTab()">&#10005; Close</button>
  </div>

  <div class="viewport" id="viewport">
    <div class="loading" id="loadingMsg">Opening Facebook...</div>
    <img id="screen" style="display:none" alt="Browser">
  </div>

  <div class="input-bar">
    <span class="hint">Type:</span>
    <input id="typeInput" type="text" placeholder="Type text here and press Enter..." onkeydown="handleTypeKey(event)">
    <button onclick="sendType()">Send</button>
    <span class="hint" style="margin-left:8px">Keys:</span>
    <button class="secondary" onclick="sendKey('Tab')" style="font-size:10px;padding:4px 8px">Tab</button>
    <button class="secondary" onclick="sendKey('Enter')" style="font-size:10px;padding:4px 8px">Enter</button>
    <button class="secondary" onclick="sendKey('Backspace')" style="font-size:10px;padding:4px 8px">&#9003;</button>
    <button class="secondary" onclick="sendKey('Escape')" style="font-size:10px;padding:4px 8px">Esc</button>
  </div>

  <script>
    var params = new URLSearchParams(window.location.search);
    var tabId = params.get('tabId');
    var DASH = window.location.origin;
    var refreshInterval = null;
    var imgEl = document.getElementById('screen');
    var loadingEl = document.getElementById('loadingMsg');
    var statusEl = document.getElementById('status');
    var urlBar = document.getElementById('urlBar');

    function api(method, path, body) {
      var opts = { method: method, headers: { 'Content-Type': 'application/json' } };
      if (body) opts.body = JSON.stringify(body);
      return fetch(DASH + path, opts).then(function(r) { return r; });
    }

    // ─── Screenshot loop ───
    function startScreenshots() {
      if (refreshInterval) clearInterval(refreshInterval);
      grabScreenshot();
      refreshInterval = setInterval(grabScreenshot, 800);
    }

    function grabScreenshot() {
      if (!tabId) return;
      fetch(DASH + '/api/browser/screenshot/' + tabId)
        .then(function(r) { return r.text(); })
        .then(function(base64) {
          if (base64 && base64.length > 100) {
            imgEl.src = 'data:image/png;base64,' + base64;
            imgEl.style.display = 'block';
            loadingEl.style.display = 'none';
            statusEl.textContent = 'Live';
            statusEl.style.color = '#4ade80';
          }
        })
        .catch(function() {
          statusEl.textContent = 'Disconnected';
          statusEl.style.color = '#f87171';
        });
    }

    // ─── Click handling ───
    imgEl.addEventListener('click', function(e) {
      var rect = imgEl.getBoundingClientRect();
      var scaleX = 1920 / rect.width;
      var scaleY = 1080 / rect.height;
      var x = Math.round((e.clientX - rect.left) * scaleX);
      var y = Math.round((e.clientY - rect.top) * scaleY);
      statusEl.textContent = 'Click ' + x + ',' + y;

      api('POST', '/api/browser/click/' + tabId, { x: x, y: y })
        .then(function() { setTimeout(grabScreenshot, 300); });
    });

    // ─── Scroll handling ───
    document.getElementById('viewport').addEventListener('wheel', function(e) {
      e.preventDefault();
      api('POST', '/api/browser/scroll/' + tabId, { deltaY: e.deltaY > 0 ? 400 : -400 })
        .then(function() { setTimeout(grabScreenshot, 200); });
    }, { passive: false });

    // ─── Typing ───
    function sendType() {
      var input = document.getElementById('typeInput');
      var text = input.value;
      if (!text) return;
      api('POST', '/api/browser/type/' + tabId, { text: text })
        .then(function() { input.value = ''; setTimeout(grabScreenshot, 200); });
    }

    function handleTypeKey(e) {
      if (e.key === 'Enter') { e.preventDefault(); sendType(); }
    }

    function sendKey(key) {
      api('POST', '/api/browser/press/' + tabId, { key: key })
        .then(function() { setTimeout(grabScreenshot, 200); });
    }

    // ─── Navigation ───
    function navigate() {
      var url = urlBar.value.trim();
      if (!url) return;
      if (!url.startsWith('http')) url = 'https://' + url;
      api('POST', '/api/browser/navigate/' + tabId, { url: url })
        .then(function() { setTimeout(grabScreenshot, 1000); });
    }

    function refresh() {
      api('POST', '/api/browser/navigate/' + tabId, { url: urlBar.value || 'https://www.facebook.com' })
        .then(function() { setTimeout(grabScreenshot, 1000); });
    }

    function goBack() {
      sendKey('Alt+ArrowLeft');
    }

    function closeTab() {
      if (refreshInterval) clearInterval(refreshInterval);
      api('DELETE', '/api/browser/tab/' + tabId);
      document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#8b8994;font-size:14px">Tab closed. You can close this window.</div>';
    }

    // ─── Init ───
    if (tabId) {
      urlBar.value = 'https://www.facebook.com';
      setTimeout(startScreenshots, 2000);
    } else {
      loadingEl.textContent = 'Error: No tab ID provided';
    }
  </script>
</body>
</html>
