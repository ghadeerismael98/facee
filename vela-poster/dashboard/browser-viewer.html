<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Remote Browser</title>
  <style>
    :root{--bg:#0c0c0e;--surface:#16161a;--border:#2a2a32;--text:#e8e6e3;--text-dim:#8b8994;--accent:#e07840;--mono:'Courier New',monospace}
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column}

    .toolbar{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
    .toolbar .status{font-size:10px;font-family:var(--mono);white-space:nowrap}
    .toolbar .status.live{color:#4ade80}
    .toolbar .status.off{color:#f87171}
    .toolbar button{padding:4px 10px;background:var(--border);color:var(--text-dim);border:none;border-radius:4px;cursor:pointer;font-size:11px}
    .toolbar button.danger{background:#7f1d1d;color:#f87171}

    .viewport{flex:1;position:relative;overflow:hidden;cursor:crosshair;display:flex;align-items:center;justify-content:center;background:#111}
    .viewport img{max-width:100%;max-height:100%;object-fit:contain;user-select:none;-webkit-user-drag:none}

    .input-bar{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
    .input-bar input{flex:1;padding:5px 10px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:12px}
    .input-bar button{padding:5px 12px;background:var(--accent);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:11px}
    .input-bar .hint{font-size:10px;color:var(--text-dim)}
    .input-bar button.key{padding:3px 8px;background:var(--border);color:var(--text-dim);border:none;border-radius:3px;cursor:pointer;font-size:10px}
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="status off" id="status">Connecting...</span>
    <span style="flex:1"></span>
    <button onclick="zoomOut()" title="Zoom out">−</button>
    <span id="zoomLevel" style="font-size:10px;font-family:var(--mono);color:var(--text-dim);min-width:35px;text-align:center">100%</span>
    <button onclick="zoomIn()" title="Zoom in">+</button>
    <button class="danger" onclick="closeTab()">Close Tab</button>
  </div>

  <div class="viewport" id="viewport" style="overflow:auto">
    <img id="screen" alt="Browser" style="display:none;transform-origin:top left">
    <div id="loadingMsg" style="color:var(--text-dim)">Opening Facebook...</div>
  </div>

  <div class="input-bar">
    <span class="hint">Type:</span>
    <input id="typeInput" type="text" placeholder="Type here, press Enter..." onkeydown="if(event.key==='Enter'){event.preventDefault();sendType()}">
    <button onclick="sendType()">Send</button>
    <button class="key" onclick="sendKey('Tab')">Tab</button>
    <button class="key" onclick="sendKey('Enter')">Enter</button>
    <button class="key" onclick="sendKey('Backspace')">&#9003;</button>
  </div>

  <script>
    var params = new URLSearchParams(window.location.search);
    var tabId = params.get('tabId');
    var DASH = window.location.origin;
    var refreshInterval = null;
    var imgEl = document.getElementById('screen');
    var loadingEl = document.getElementById('loadingMsg');
    var statusEl = document.getElementById('status');
    var zoomPct = 100; // percentage of viewport width

    function zoomIn() {
      if (zoomPct >= 300) return;
      zoomPct += 10;
      applyZoom();
    }
    function zoomOut() {
      if (zoomPct <= 30) return;
      zoomPct -= 10;
      applyZoom();
    }
    function applyZoom() {
      imgEl.style.transform = 'none';
      if (zoomPct === 100) {
        imgEl.style.maxWidth = '100%';
        imgEl.style.maxHeight = '100%';
        imgEl.style.width = '';
      } else {
        imgEl.style.maxWidth = 'none';
        imgEl.style.maxHeight = 'none';
        imgEl.style.width = zoomPct + '%';
      }
      document.getElementById('zoomLevel').textContent = zoomPct + '%';
    }

    function startScreenshots() {
      if (refreshInterval) clearInterval(refreshInterval);
      grabScreenshot();
      refreshInterval = setInterval(grabScreenshot, 300);
    }

    function grabScreenshot() {
      if (!tabId) return;
      fetch(DASH + '/api/browser/screenshot/' + tabId)
        .then(function(r) { return r.text(); })
        .then(function(base64) {
          if (base64 && base64.length > 100) {
            imgEl.src = 'data:image/png;base64,' + base64;
            imgEl.style.display = 'block';
            loadingEl.style.display = 'none';
            statusEl.textContent = 'Live';
            statusEl.className = 'status live';
          }
        })
        .catch(function() {
          statusEl.textContent = 'Disconnected';
          statusEl.className = 'status off';
        });
    }

    imgEl.addEventListener('click', function(e) {
      var rect = imgEl.getBoundingClientRect();
      var x = Math.round((e.clientX - rect.left) * (1920 / (rect.width)));
      var y = Math.round((e.clientY - rect.top) * (1080 / (rect.height)));
      fetch(DASH + '/api/browser/click/' + tabId, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ x: x, y: y })
      }).then(function() { setTimeout(grabScreenshot, 200); });
    });

    document.getElementById('viewport').addEventListener('wheel', function(e) {
      e.preventDefault();
      fetch(DASH + '/api/browser/scroll/' + tabId, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ deltaY: e.deltaY > 0 ? 400 : -400 })
      }).then(function() { setTimeout(grabScreenshot, 150); });
    }, { passive: false });

    function sendType() {
      var input = document.getElementById('typeInput');
      if (!input.value) return;
      fetch(DASH + '/api/browser/type/' + tabId, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: input.value })
      }).then(function() { input.value = ''; setTimeout(grabScreenshot, 150); });
    }

    function sendKey(key) {
      fetch(DASH + '/api/browser/press/' + tabId, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key: key })
      }).then(function() { setTimeout(grabScreenshot, 150); });
    }

    function closeTab() {
      if (refreshInterval) clearInterval(refreshInterval);
      fetch(DASH + '/api/browser/tab/' + tabId, { method: 'DELETE' });
      // Go back to the poster popup UI
      var profileId = params.get('profile');
      var port = params.get('port');
      if (port) {
        window.location.href = 'http://' + window.location.hostname + ':' + port + '/';
      } else {
        window.location.href = 'http://' + window.location.hostname + ':3333/';
      }
    }

    // Validate tabId to prevent path traversal
    if (tabId && /^[a-zA-Z0-9_-]+$/.test(tabId)) {
      setTimeout(startScreenshots, 2000);
    } else {
      loadingEl.textContent = tabId ? 'Error: Invalid tab ID' : 'Error: No tab ID';
    }
  </script>
</body>
</html>
