services:
  ghost-browser:
    build: ./ghost-browser
    ports:
      - "127.0.0.1:1306:1306"   # API — internal only
    volumes:
      - ghost-data:/data
    environment:
      - PORT=1306
      - API_KEY=${API_KEY}
      - DATA_DIR=/data
    shm_size: 2gb
    security_opt:
      - seccomp=unconfined
    restart: unless-stopped

  vela-poster:
    build: ./vela-poster
    ports:
      - "${POSTER_PORT:-3333}:${POSTER_PORT:-3333}"
      - "5001-5020:5001-5020"
    environment:
      - VELA_API_URL=http://ghost-browser:1306
      - VELA_API_KEY=${API_KEY}
      - PORT=${POSTER_PORT:-3333}
    depends_on:
      - ghost-browser
    volumes:
      - poster-data:/home/appuser/.face-poster
    restart: unless-stopped

  dashboard:
    build: ./vela-poster/dashboard
    ports:
      - "127.0.0.1:4000:4000"   # Internal only — accessed via Cloudflare Tunnel
    environment:
      - POSTER_URL=http://vela-poster:${POSTER_PORT:-3333}
      - VELA_API_URL=http://ghost-browser:1306
      - VELA_API_KEY=${API_KEY}
      - DASH_USER=${DASH_USER:-admin}
      - DASH_PASS=${DASH_PASS:-}
    depends_on:
      - vela-poster
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    environment:
      - CF_TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    depends_on:
      - dashboard
    restart: unless-stopped

volumes:
  ghost-data:
  poster-data:
