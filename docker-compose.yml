services:
  ghost-browser:
    build: ./ghost-browser
    ports:
      - "127.0.0.1:1306:1306"   # API — internal only, not exposed to internet
      - "127.0.0.1:6080:6080"   # noVNC — proxied through dashboard, not direct
    volumes:
      - ghost-data:/data
    environment:
      - PORT=1306
      - API_KEY=${API_KEY}
      - DATA_DIR=/data
      - VNC_PASSWORD=${VNC_PASSWORD:-ghostvnc}
    shm_size: 2gb
    restart: unless-stopped

  vela-poster:
    build: ./vela-poster
    ports:
      - "127.0.0.1:${POSTER_PORT:-3333}:${POSTER_PORT:-3333}"  # internal only
      - "127.0.0.1:5001:5001"
      - "127.0.0.1:5002:5002"
      - "127.0.0.1:5003:5003"
      - "127.0.0.1:5004:5004"
      - "127.0.0.1:5005:5005"
    environment:
      - VELA_API_URL=http://ghost-browser:1306
      - VELA_API_KEY=${API_KEY}
      - PORT=${POSTER_PORT:-3333}
    depends_on:
      - ghost-browser
    volumes:
      - poster-data:/home/appuser/.face-poster
    restart: unless-stopped

  dashboard:
    build: ./vela-poster/dashboard
    ports:
      - "4000:4000"   # Only this port exposed to internet
    environment:
      - POSTER_URL=http://vela-poster:${POSTER_PORT:-3333}
      - VELA_API_URL=http://ghost-browser:1306
      - VELA_API_KEY=${API_KEY}
      - DASH_USER=${DASH_USER:-admin}
      - DASH_PASS=${DASH_PASS:-}
      - VNC_HOST=ghost-browser
    depends_on:
      - vela-poster
    restart: unless-stopped

volumes:
  ghost-data:
  poster-data:
